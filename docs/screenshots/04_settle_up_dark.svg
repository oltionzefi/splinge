<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.09"/></filter>
    <filter id="b"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#4CAF50" flood-opacity="0.38"/></filter>
    <g id="back">
      <polyline points="6,0 0,0" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <polyline points="3.5,-3 0,0 3.5,3" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- GroupAdd icon -->
    <g id="group-add">
      <circle cx="-4" cy="-3" r="5" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
      <path d="M-12,8 C-12,4 -8,2 -4,2 C0,2 4,4 4,8" fill="none" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="8" y2="8" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="4" y1="4" x2="12" y2="4" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <g id="tick">
      <polyline points="-4,0 -1,3 5,-4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Phone shell -->
  <rect width="320" height="640" rx="36" fill="#212121"/>
  <rect x="10" y="10" width="300" height="620" rx="28" fill="#F5F5F5"/>

  <!-- Status bar -->
  <text x="28" y="26" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#212121">9:41</text>
  <circle cx="258" cy="20" r="2.2" fill="#212121"/><circle cx="265" cy="20" r="2.2" fill="#212121"/><circle cx="272" cy="20" r="2.2" fill="#212121"/>
  <rect x="276" y="16" width="18" height="10" rx="2" fill="none" stroke="#212121" stroke-width="1.2"/>
  <rect x="294" y="18.5" width="2.5" height="5" rx="1" fill="#212121"/>
  <rect x="277.5" y="17.5" width="10" height="7" rx="1" fill="#212121"/>

  <!-- MediumTopAppBar: white, 96px, title at bottom -->
  <rect x="10" y="34" width="300" height="96" fill="#FFFFFF"/>
  <use href="#back" transform="translate(32,58)"/>
  <text x="20" y="118" font-family="system-ui,sans-serif" font-size="22" font-weight="400" fill="#212121">New Group</text>
  <line x1="10" y1="130" x2="310" y2="130" stroke="#E0E0E0" stroke-width="0.6"/>

  <!-- OutlinedTextField "Group Name" — focused -->
  <rect x="20" y="146" width="280" height="56" rx="10" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <rect x="52" y="143" width="62" height="8" fill="#F5F5F5"/>
  <text x="54" y="150" font-family="system-ui,sans-serif" font-size="10" fill="#4CAF50">Group Name</text>
  <use href="#group-add" transform="translate(38,174)"/>
  <text x="58" y="174" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">Summer Trip 2025</text>

  <!-- "Add myself" Card — secondaryContainer tint (name is set) -->
  <rect x="20" y="218" width="280" height="72" rx="12" fill="#B2DFDB" fill-opacity="0.3" filter="url(#s)"/>
  <text x="36" y="246" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#212121" dominant-baseline="middle">Add myself to this group</text>
  <text x="36" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#616161" dominant-baseline="middle">As member: Max</text>
  <!-- Switch ON: green track + white thumb right -->
  <rect x="245" y="236" width="40" height="22" rx="11" fill="#4CAF50"/>
  <circle cx="274" cy="247" r="9" fill="#FFFFFF" filter="url(#s)"/>

  <!-- Button "Create Group" (full width, shape large rx=20) -->
  <rect x="20" y="468" width="280" height="56" rx="20" fill="#4CAF50" filter="url(#b)"/>
  <text x="160" y="496" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Create Group</text>

  <!-- Home indicator -->
  <rect x="120" y="621" width="80" height="4" rx="2" fill="#000" opacity="0.16"/>
</svg>

