<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.09"/></filter>
    <filter id="f"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#4CAF50" flood-opacity="0.38"/></filter>
    <!-- MD3 back arrow icon -->
    <g id="back">
      <polyline points="6,0 0,0" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <polyline points="3.5,-3 0,0 3.5,3" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Share (upload) icon -->
    <g id="share">
      <polyline points="0,4 0,-2" stroke="#616161" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <polyline points="-3,1 0,-2 3,1" stroke="#616161" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <polyline points="-5,5 -5,7 5,7 5,5" stroke="#616161" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- MoreVert -->
    <g id="more">
      <circle cx="0" cy="-6" r="1.5" fill="#616161"/>
      <circle cx="0" cy="0"  r="1.5" fill="#616161"/>
      <circle cx="0" cy="6"  r="1.5" fill="#616161"/>
    </g>
    <!-- Right arrow for balance card -->
    <g id="arrow-right">
      <polyline points="-5,0 5,0" stroke="#009688" stroke-width="2" stroke-linecap="round" fill="none"/>
      <polyline points="2,-3 5,0 2,3" stroke="#009688" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- Receipt icon lines -->
    <g id="receipt">
      <rect x="-11" y="-14" width="22" height="28" rx="2" fill="#EEEEEE"/>
      <line x1="-7" y1="-7" x2="7" y2="-7" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-7" y1="-1" x2="4"  y2="-1" stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-7" y1="5"  x2="6"  y2="5"  stroke="#9E9E9E" stroke-width="1.8" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Phone shell -->
  <rect width="320" height="640" rx="36" fill="#212121"/>
  <rect x="10" y="10" width="300" height="620" rx="28" fill="#F5F5F5"/>

  <!-- Status bar -->
  <text x="28" y="26" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#212121">9:41</text>
  <circle cx="258" cy="20" r="2.2" fill="#212121"/><circle cx="265" cy="20" r="2.2" fill="#212121"/><circle cx="272" cy="20" r="2.2" fill="#212121"/>
  <rect x="276" y="16" width="18" height="10" rx="2" fill="none" stroke="#212121" stroke-width="1.2"/>
  <rect x="294" y="18.5" width="2.5" height="5" rx="1" fill="#212121"/>
  <rect x="277.5" y="17.5" width="10" height="7" rx="1" fill="#212121"/>

  <!-- MediumTopAppBar: white bg, 96px tall, title at bottom-left -->
  <rect x="10" y="34" width="300" height="96" fill="#FFFFFF"/>
  <use href="#back"  transform="translate(32,58)"/>
  <use href="#share" transform="translate(263,58)"/>
  <use href="#more"  transform="translate(286,58)"/>
  <!-- group name title at bottom (titleLarge bold ~22sp) -->
  <text x="20" y="118" font-family="system-ui,sans-serif" font-size="21" font-weight="700" fill="#212121">Summer Trip 2025</text>
  <line x1="10" y1="130" x2="310" y2="130" stroke="#E0E0E0" stroke-width="0.6"/>

  <!-- ── Members ── -->
  <text x="20" y="152" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#212121">Members</text>
  <!-- TextButton "+ Add" -->
  <text x="254" y="152" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#4CAF50">+ Add</text>

  <!-- Member card Alice (Card surface white, shape medium rx=12) -->
  <rect x="20" y="160" width="280" height="56" rx="12" fill="#FFFFFF" filter="url(#s)"/>
  <circle cx="48" cy="188" r="16" fill="#C8E6C9"/>
  <text x="48" y="188" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B5E20" text-anchor="middle" dominant-baseline="central">A</text>
  <text x="72" y="184" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#212121" dominant-baseline="auto">Alice</text>
  <text x="72" y="200" font-family="system-ui,sans-serif" font-size="11" fill="#4CAF50">is owed €56.00</text>

  <!-- Member card Bob -->
  <rect x="20" y="222" width="280" height="56" rx="12" fill="#FFFFFF" filter="url(#s)"/>
  <circle cx="48" cy="250" r="16" fill="#C8E6C9"/>
  <text x="48" y="250" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1B5E20" text-anchor="middle" dominant-baseline="central">B</text>
  <text x="72" y="246" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#212121">Bob</text>
  <text x="72" y="262" font-family="system-ui,sans-serif" font-size="11" fill="#B00020">owes €24.00</text>

  <!-- ── Balances ── -->
  <text x="20" y="298" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#212121">Balances</text>

  <!-- Balance card: secondaryContainer teal 30% opacity, rx=12 -->
  <rect x="20" y="306" width="280" height="58" rx="12" fill="#B2DFDB" fill-opacity="0.45" filter="url(#s)"/>
  <use href="#arrow-right" transform="translate(40,335)"/>
  <text x="56" y="328" font-family="system-ui,sans-serif" font-size="13" fill="#212121">Bob owes Alice</text>
  <text x="56" y="348" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#009688">€24.00</text>

  <!-- ── Expenses ── -->
  <text x="20" y="386" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#212121">Expenses</text>

  <!-- Expense card 1: OutlinedCard, rx=12 -->
  <rect x="20" y="394" width="280" height="64" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.2"/>
  <use href="#receipt" transform="translate(52,426)"/>
  <text x="80" y="418" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#212121">Hotel Booking</text>
  <text x="80" y="436" font-family="system-ui,sans-serif" font-size="11" fill="#757575">Paid by Alice • Split among 2</text>
  <text x="248" y="427" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">€120</text>

  <!-- Expense card 2 -->
  <rect x="20" y="466" width="280" height="64" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.2"/>
  <use href="#receipt" transform="translate(52,498)"/>
  <text x="80" y="490" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#212121">Dinner</text>
  <text x="80" y="508" font-family="system-ui,sans-serif" font-size="11" fill="#757575">Paid by Bob • Split among 3</text>
  <text x="248" y="499" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#212121" text-anchor="end">€48</text>

  <!-- ExtendedFAB "Add Expense" -->
  <rect x="124" y="555" width="166" height="48" rx="24" fill="#4CAF50" filter="url(#f)"/>
  <text x="150" y="579" font-family="system-ui,sans-serif" font-size="22" font-weight="300" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">+</text>
  <text x="166" y="579" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#FFFFFF" dominant-baseline="middle">Add Expense</text>

  <!-- Home indicator -->
  <rect x="120" y="621" width="80" height="4" rx="2" fill="#000" opacity="0.16"/>
</svg>

