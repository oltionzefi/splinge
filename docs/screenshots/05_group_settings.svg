<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.09"/></filter>
    <filter id="b"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#4CAF50" flood-opacity="0.38"/></filter>
    <g id="back">
      <polyline points="6,0 0,0" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <polyline points="3.5,-3 0,0 3.5,3" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="tick">
      <polyline points="-4,0 -1,3 5,-4" fill="none" stroke="#1B5E20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Phone shell -->
  <rect width="320" height="640" rx="36" fill="#212121"/>
  <rect x="10" y="10" width="300" height="620" rx="28" fill="#F5F5F5"/>

  <!-- Status bar -->
  <text x="28" y="26" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#212121">9:41</text>
  <circle cx="258" cy="20" r="2.2" fill="#212121"/><circle cx="265" cy="20" r="2.2" fill="#212121"/><circle cx="272" cy="20" r="2.2" fill="#212121"/>
  <rect x="276" y="16" width="18" height="10" rx="2" fill="none" stroke="#212121" stroke-width="1.2"/>
  <rect x="294" y="18.5" width="2.5" height="5" rx="1" fill="#212121"/>
  <rect x="277.5" y="17.5" width="10" height="7" rx="1" fill="#212121"/>

  <!-- MediumTopAppBar: white, 96px, title at bottom -->
  <rect x="10" y="34" width="300" height="96" fill="#FFFFFF"/>
  <use href="#back" transform="translate(32,58)"/>
  <text x="20" y="118" font-family="system-ui,sans-serif" font-size="22" font-weight="400" fill="#212121">App Settings</text>
  <line x1="10" y1="130" x2="310" y2="130" stroke="#E0E0E0" stroke-width="0.6"/>

  <!-- "Your Profile" Card (surfaceVariant #EEEEEE, shape large rx=20) -->
  <rect x="20" y="146" width="280" height="218" rx="20" fill="#EEEEEE" filter="url(#s)"/>

  <!-- Card title -->
  <text x="36" y="172" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#4CAF50" dominant-baseline="middle">Your Profile</text>
  <!-- Card subtitle -->
  <text x="36" y="192" font-family="system-ui,sans-serif" font-size="11" fill="#616161" dominant-baseline="middle">This info is used when creating new groups.</text>

  <!-- OutlinedTextField: Your Name (unfocused, grey border) -->
  <rect x="36" y="204" width="248" height="52" rx="10" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
  <!-- floating label cutout -->
  <rect x="50" y="201" width="58" height="8" fill="#EEEEEE"/>
  <text x="52" y="208" font-family="system-ui,sans-serif" font-size="10" fill="#757575">Your Name</text>
  <text x="52" y="230" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">Max Mustermann</text>

  <!-- OutlinedTextField: PayPal Username (focused, green border) -->
  <rect x="36" y="268" width="248" height="52" rx="10" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <!-- floating label cutout -->
  <rect x="50" y="265" width="84" height="8" fill="#EEEEEE"/>
  <text x="52" y="272" font-family="system-ui,sans-serif" font-size="10" fill="#4CAF50">PayPal Username</text>
  <!-- @ leading text -->
  <text x="50" y="294" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#757575" dominant-baseline="middle">@</text>
  <text x="64" y="294" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">max.mustermann</text>

  <!-- Save Settings Button (primary green, shape large rx=20) -->
  <rect x="20" y="396" width="280" height="56" rx="20" fill="#4CAF50" filter="url(#b)"/>
  <text x="160" y="424" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Save Settings</text>

  <!-- Home indicator -->
  <rect x="120" y="621" width="80" height="4" rx="2" fill="#000" opacity="0.16"/>
</svg>

