<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.09"/></filter>
    <filter id="b"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#4CAF50" flood-opacity="0.38"/></filter>
    <g id="back">
      <polyline points="6,0 0,0" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
      <polyline points="3.5,-3 0,0 3.5,3" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Description icon: lined paper -->
    <g id="desc-icon">
      <rect x="-8" y="-10" width="16" height="20" rx="2" fill="#EEEEEE" stroke="#9E9E9E" stroke-width="1"/>
      <line x1="-5" y1="-4" x2="5" y2="-4" stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="0"  x2="5" y2="0"  stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="4"  x2="2" y2="4"  stroke="#9E9E9E" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Checkmark tick path for checked checkbox -->
    <g id="tick">
      <polyline points="-4,0 -1,3 5,-4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Phone shell -->
  <rect width="320" height="640" rx="36" fill="#212121"/>
  <rect x="10" y="10" width="300" height="620" rx="28" fill="#F5F5F5"/>

  <!-- Status bar -->
  <text x="28" y="26" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#212121">9:41</text>
  <circle cx="258" cy="20" r="2.2" fill="#212121"/><circle cx="265" cy="20" r="2.2" fill="#212121"/><circle cx="272" cy="20" r="2.2" fill="#212121"/>
  <rect x="276" y="16" width="18" height="10" rx="2" fill="none" stroke="#212121" stroke-width="1.2"/>
  <rect x="294" y="18.5" width="2.5" height="5" rx="1" fill="#212121"/>
  <rect x="277.5" y="17.5" width="10" height="7" rx="1" fill="#212121"/>

  <!-- TopAppBar: white, 56px -->
  <rect x="10" y="34" width="300" height="56" fill="#FFFFFF"/>
  <use href="#back" transform="translate(32,62)"/>
  <text x="52" y="62" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#212121" dominant-baseline="middle">Add Expense</text>
  <line x1="10" y1="90" x2="310" y2="90" stroke="#E0E0E0" stroke-width="0.6"/>

  <!-- OutlinedTextField: "What was it for?" — FOCUSED (green border, thicker) -->
  <rect x="20" y="106" width="280" height="56" rx="10" fill="none" stroke="#4CAF50" stroke-width="2"/>
  <!-- floating label (green, above field) -->
  <rect x="44" y="103" width="80" height="8" fill="#F5F5F5"/>
  <text x="46" y="110" font-family="system-ui,sans-serif" font-size="10" fill="#4CAF50">What was it for?</text>
  <!-- leading icon -->
  <use href="#desc-icon" transform="translate(36,134)"/>
  <text x="54" y="138" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">Hotel Booking</text>

  <!-- OutlinedTextField: "Amount" — unfocused -->
  <rect x="20" y="174" width="280" height="56" rx="10" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
  <rect x="36" y="171" width="40" height="8" fill="#F5F5F5"/>
  <text x="38" y="178" font-family="system-ui,sans-serif" font-size="10" fill="#757575">Amount</text>
  <!-- € leading text -->
  <text x="34" y="202" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#616161" dominant-baseline="middle">€</text>
  <text x="50" y="202" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">120.00</text>

  <!-- "Paid by" label -->
  <text x="20" y="252" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#212121">Paid by</text>

  <!-- FilterChip Alice — selected: primaryContainer fill + border -->
  <rect x="20" y="260" width="70" height="32" rx="16" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5"/>
  <!-- small checkmark inside chip -->
  <use href="#tick" transform="translate(34,276)"/>
  <text x="44" y="276" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1B5E20" dominant-baseline="middle">Alice</text>
  <!-- FilterChip Bob — unselected -->
  <rect x="98" y="260" width="52" height="32" rx="16" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
  <text x="124" y="276" font-family="system-ui,sans-serif" font-size="12" fill="#616161" text-anchor="middle" dominant-baseline="middle">Bob</text>
  <!-- FilterChip Carol — unselected -->
  <rect x="158" y="260" width="58" height="32" rx="16" fill="none" stroke="#9E9E9E" stroke-width="1.2"/>
  <text x="187" y="276" font-family="system-ui,sans-serif" font-size="12" fill="#616161" text-anchor="middle" dominant-baseline="middle">Carol</text>

  <!-- "Split among" label -->
  <text x="20" y="320" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#212121">Split among</text>

  <!-- Checkbox row: Alice (checked) -->
  <rect x="20" y="332" width="20" height="20" rx="4" fill="#4CAF50"/>
  <use href="#tick" transform="translate(30,342)"/>
  <text x="48" y="342" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">Alice</text>

  <!-- Checkbox row: Bob (checked) -->
  <rect x="20" y="364" width="20" height="20" rx="4" fill="#4CAF50"/>
  <use href="#tick" transform="translate(30,374)"/>
  <text x="48" y="374" font-family="system-ui,sans-serif" font-size="15" fill="#212121" dominant-baseline="middle">Bob</text>

  <!-- Checkbox row: Carol (unchecked) -->
  <rect x="20" y="396" width="20" height="20" rx="4" fill="none" stroke="#9E9E9E" stroke-width="1.5"/>
  <text x="48" y="406" font-family="system-ui,sans-serif" font-size="15" fill="#757575" dominant-baseline="middle">Carol</text>

  <!-- Button "Save Expense" -->
  <rect x="20" y="454" width="280" height="56" rx="20" fill="#4CAF50" filter="url(#b)"/>
  <text x="160" y="482" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Save Expense</text>

  <!-- Home indicator -->
  <rect x="120" y="621" width="80" height="4" rx="2" fill="#000" opacity="0.16"/>
</svg>

